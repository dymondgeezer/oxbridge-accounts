<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxbridge Associates — Live Xero Consolidation</title>
<style>
:root{
  --bg:#0f0f11;--bg2:#16161a;--bg3:#1e1e24;--bg4:#26262e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f2;--text2:#c6c6d2;--text3:#9696a6;
  --accent:#7c6fe0;--green:#22c984;--red:#e05a5a;--amber:#e0a030;
  --blue:#4a9de0;--teal:#2abfa0;--r:10px;--rs:6px;
}
body.light{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#eef0f3;--bg4:#e2e4e8;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1a2e;--text2:#4a4a5a;--text3:#74748a;
  --accent:#6c5fc7;--green:#1aaa6e;--red:#cc3333;--amber:#c07800;
  --blue:#2a7dc0;--teal:#1a9f88;
}
.theme-toggle{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .2s;}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
.expand-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:2px 6px;border-radius:3px;transition:all .15s;}
.expand-btn:hover{background:var(--bg3);color:var(--text);}
.detail-row td{font-size:11px;color:var(--text2);background:var(--bg3)!important;}
.detail-row td:first-child{padding-left:28px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}
.nlogo{display:flex;align-items:center;gap:10px;}
.nmark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.ntitle{font-size:13px;font-weight:600;}
.nsub{font-size:11px;color:var(--text3);}
.ntabs{display:flex;gap:2px;}
.ntab{padding:5px 13px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:all .15s;}
.ntab:hover{background:var(--bg3);color:var(--text);}
.ntab.active{background:var(--accent);color:#fff;}
.ntab:disabled{opacity:.35;cursor:not-allowed;}
.nright{display:flex;align-items:center;gap:8px;}
.pbadge{font-size:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;color:var(--text2);}
.pbadge.live{border-color:var(--green);color:var(--green);}
.btn{border:none;border-radius:var(--rs);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
.btn-pri{background:var(--accent);color:#fff;}
.btn-pri:hover{background:#6a5fd0;}
.btn-pri:disabled{opacity:.4;cursor:not-allowed;}
.btn-sec{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-sec:hover{border-color:var(--accent);color:var(--accent);}
.btn-green{background:var(--green);color:#0a1a0a;}
.btn-green:hover{background:#1db872;}
.btn-green:disabled{opacity:.4;cursor:not-allowed;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;animation:spin .8s linear infinite;}
.app{display:flex;height:calc(100vh - 52px);}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);padding:14px 10px;overflow-y:auto;}
.main{flex:1;overflow-y:auto;padding:22px 26px;}
.slabel{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;padding:0 6px;}
.ssec{margin-bottom:18px;}
.sitem{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--rs);color:var(--text2);font-size:12px;}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.kgrid{display:grid;gap:11px;margin-bottom:18px;}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;}
.klabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.kval{font-size:20px;font-weight:700;}
.ksub{font-size:11px;margin-top:3px;color:var(--text3);}
.twrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;overflow-x:auto;}
.ptable{width:100%;border-collapse:collapse;font-size:12px;}
.ptable th{background:var(--bg3);color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:8px 11px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
.ptable th:first-child{text-align:left;}
.ptable td{padding:6px 11px;text-align:right;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;}
.ptable td:first-child{text-align:left;color:var(--text2);padding-left:14px;}
.ptable tr.tr-h td{background:var(--bg3);color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.ptable tr.tr-t td{font-weight:700;background:rgba(124,111,224,.07);border-top:1px solid var(--border2);}
.ptable tr:hover td{background:rgba(255,255,255,.015);}
.vp{color:var(--green)!important;}
.vn{color:var(--red)!important;}
.mt{color:var(--text2)!important;}
.red{color:var(--red);}
.green{color:var(--green);}
.egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px;}
.ecard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;}
.eheader{display:flex;align-items:center;gap:7px;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.ename{font-size:12px;font-weight:600;flex:1;}
.eccy{font-size:10px;color:var(--text3);background:var(--bg3);border-radius:4px;padding:2px 6px;}
.erows{display:flex;flex-direction:column;gap:7px;}
.erow{display:flex;justify-content:space-between;align-items:baseline;}
.elbl{font-size:11px;color:var(--text3);}
.eval{font-size:13px;font-weight:600;}
.ph{margin-bottom:16px;}
.pt{font-size:17px;font-weight:700;}
.ps{font-size:12px;color:var(--text3);margin-top:2px;}
/* SETUP */
#setup-screen{max-width:620px;margin:0 auto;}
.setup-hero{text-align:center;margin-bottom:28px;padding-top:20px;}
.setup-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;}
.setup-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--text2);line-height:1.7;max-width:460px;margin:0 auto;}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.stepn{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.flabel{font-size:11px;color:var(--text2);font-weight:500;}
.finput{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:8px 12px;font-size:13px;font-family:inherit;width:100%;transition:border-color .15s;}
.finput:focus{outline:none;border-color:var(--accent);}
.mono{font-family:'SF Mono','Fira Code',monospace;font-size:12px;}
.fhint{font-size:10px;color:var(--text3);}
.alert{padding:10px 14px;border-radius:var(--rs);font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.aw{background:rgba(224,160,48,.1);border:1px solid rgba(224,160,48,.3);color:var(--amber);}
.ae{background:rgba(224,90,90,.1);border:1px solid rgba(224,90,90,.3);color:var(--red);}
.ao{background:rgba(34,201,132,.1);border:1px solid rgba(34,201,132,.3);color:var(--green);}
.conn-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);width:100%;margin-bottom:8px;transition:all .15s;}
.conn-btn:hover{border-color:var(--teal);color:var(--teal);}
.conn-btn.ok{border-color:var(--green);color:var(--green);background:rgba(34,201,132,.05);}
.conn-btn.err{border-color:var(--red);color:var(--red);}
.org-label{font-size:10px;color:var(--text3);margin-bottom:4px;margin-top:10px;}
code{background:var(--bg3);padding:2px 6px;border-radius:3px;font-size:11px;font-family:monospace;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
/* Period selector */
.period-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.psel-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;}
.psel-btn:hover{border-color:var(--accent);color:var(--accent);}
.psel-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.month-table{width:100%;border-collapse:collapse;font-size:11px;}
.month-table th{background:var(--bg3);color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;}
.month-table th:first-child{text-align:left;cursor:default;min-width:180px;}
.month-table th.active-col{background:var(--accent);color:#fff;}
.month-table td{padding:5px 10px;text-align:right;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;font-size:11px;}
.month-table td:first-child{text-align:left;color:var(--text2);}
.month-table tr.mtr-h td{background:var(--bg3);color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.month-table tr.mtr-t td{font-weight:700;background:rgba(124,111,224,.07);border-top:1px solid var(--border2);}
.month-table tr:hover td{background:rgba(255,255,255,.015);}
.month-table th.active-col~td{background:rgba(124,111,224,.04);}
/* Toast */
.toast{position:fixed;top:60px;right:20px;z-index:300;max-width:400px;padding:10px 14px;border-radius:var(--rs);font-size:12px;display:flex;align-items:flex-start;gap:8px;animation:fadeIn .2s ease;line-height:1.5;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<nav>
  <div class="nlogo">
    <div class="nmark">OA</div>
    <div><div class="ntitle">Oxbridge Associates Group</div><div class="nsub">Live Xero Consolidation</div></div>
  </div>
  <div class="ntabs">
    <button class="ntab active" onclick="setView('overview')" id="tab-overview">Overview</button>
    <button class="ntab" onclick="setView('periods')" id="tab-periods" disabled>Periods</button>
    <button class="ntab" onclick="setView('pnl')" id="tab-pnl" disabled>P&amp;L</button>
    <button class="ntab" onclick="setView('balance')" id="tab-balance" disabled>Balance Sheet</button>
    <button class="ntab" onclick="setView('capital')" id="tab-capital" disabled>Capital &amp; Reserves</button>
    <button class="ntab" onclick="setView('facilities')" id="tab-facilities" disabled>Facilities</button>
  </div>
  <div class="nright">
    <span class="pbadge" id="period-badge">Not connected</span>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀ Light</button>
    <button class="btn btn-sec" onclick="goToSetup()" style="font-size:11px;padding:5px 10px">⚙ Settings</button>
    <button class="btn btn-green" onclick="refreshAll()" id="btn-refresh" disabled>
      <span id="ri">↻</span> Refresh
    </button>
  </div>
</nav>
<div class="app">
  <div class="sidebar">
    <div class="ssec">
      <div class="slabel">Connections</div>
      <div class="sitem"><div class="sdot" id="dot-uk" style="background:var(--text3)"></div><div><div style="font-size:11px;font-weight:600"><svg viewBox="0 0 60 30" width="14" height="9" style="vertical-align:middle;margin-right:5px;border-radius:1px" aria-hidden="true"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="2"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg>UK Ltd</div><div style="font-size:10px;color:var(--text3)" id="st-uk">Not connected</div></div></div>
      <div class="sitem" style="margin-top:4px"><div class="sdot" id="dot-bv" style="background:var(--text3)"></div><div><div style="font-size:11px;font-weight:600"><svg viewBox="0 0 60 30" width="14" height="9" style="vertical-align:middle;margin-right:5px;border-radius:1px" aria-hidden="true"><rect width="60" height="10" fill="#AE1C28"/><rect y="10" width="60" height="10" fill="#F9F9F9"/><rect y="20" width="60" height="10" fill="#21468B"/></svg>BV</div><div style="font-size:10px;color:var(--text3)" id="st-bv">Not connected</div></div></div>
      <div class="sitem" style="margin-top:4px"><div class="sdot" id="dot-ard" style="background:var(--text3)"></div><div><div style="font-size:11px;font-weight:600"><svg viewBox="0 0 60 30" width="14" height="9" style="vertical-align:middle;margin-right:5px;border-radius:1px" aria-hidden="true"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="2"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg>ARD</div><div style="font-size:10px;color:var(--text3)" id="st-ard">Not connected</div></div></div>
    </div>
    <div class="ssec"><div class="slabel">Last Refreshed</div><div style="font-size:11px;color:var(--text3);padding:0 6px" id="last-rt">—</div></div>
    <div class="ssec"><div class="slabel">EUR→GBP Rate</div><div style="font-size:15px;font-weight:700;padding:0 6px;color:var(--teal)" id="fx-disp">—</div></div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
// ── XERO CONFIG
const XERO_AUTH  = 'https://login.xero.com/identity/connect/authorize';
const XERO_TOKEN = 'https://identity.xero.com/connect/token';
const XERO_API   = 'https://api.xero.com/api.xro/2.0';
// IMPORTANT: this must match EXACTLY what's in your Xero developer portal
const REDIRECT_URI = location.href.split('?')[0].split('#')[0];
const SCOPES = 'openid profile email offline_access accounting.reports.balancesheet.read accounting.reports.profitandloss.read accounting.settings.read';

let S = {
  clientId:  localStorage.getItem('ox_cid')||'',  // public Xero App Client ID (admin connect only)
  pw:        sessionStorage.getItem('ox_pw')||'',  // shared access password
  connected: false,
  tenantNames: [],
  data: null,
  view: 'overview',
};

// ── FORMAT HELPERS
const fmtF = v => v==null||isNaN(v)?'—':(v<0?'-':'')+'£'+Math.abs(Math.round(v)).toLocaleString('en-GB');
const fmtE = v => v==null||isNaN(v)?'—':(v<0?'-':'')+'€'+Math.abs(Math.round(v)).toLocaleString('en-GB');
const fmt  = v => { if(v==null||isNaN(v))return'—'; const a=Math.abs(v); let s; if(a>=1e6)s=(v/1e6).toFixed(1)+'M'; else if(a>=1000)s=(v/1000).toFixed(0)+'k'; else s=Math.round(v).toString(); return'£'+s; };
const fmtP = v => v==null||isNaN(v)||!isFinite(v)?'—':(v*100).toFixed(1)+'%';
const vc   = v => v>0?'vp':v<0?'vn':'';
const $    = id => document.getElementById(id);
// ── FLAGS (inline SVG so they render on every OS, incl. Windows)
const FLAG_GB='<svg viewBox="0 0 60 30" width="15" height="10" style="vertical-align:middle;margin-right:5px;border-radius:1px;box-shadow:0 0 0 .5px rgba(0,0,0,.2)" aria-hidden="true"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="2"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg>';
const FLAG_NL='<svg viewBox="0 0 60 30" width="15" height="10" style="vertical-align:middle;margin-right:5px;border-radius:1px;box-shadow:0 0 0 .5px rgba(0,0,0,.2)" aria-hidden="true"><rect width="60" height="10" fill="#AE1C28"/><rect y="10" width="60" height="10" fill="#F9F9F9"/><rect y="20" width="60" height="10" fill="#21468B"/></svg>';
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('ox_theme', isLight ? 'light' : 'dark');
  $('theme-btn').textContent = isLight ? '🌙 Dark' : '☀ Light';
}
// Apply saved theme on load
if(localStorage.getItem('ox_theme')==='light') {
  document.body.classList.add('light');
}

// ── ON LOAD
window.onload = () => {
  if(localStorage.getItem('ox_theme')==='light') {
    const tb = $('theme-btn'); if(tb) tb.textContent = '🌙 Dark';
  }
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const state = params.get('state');
  if(code && state==='connect') {
    history.replaceState({},'',location.pathname);
    doBootstrap(code);
    return;
  }
  if(S.pw) { showDash(); refreshAll(); }
  else { showGate(); }
};

const allOk = () => S.connected;

function updateSidebar() {
  ['uk','bv','ard'].forEach(o => {
    const on = S.connected;
    $('dot-'+o).style.background = on ? 'var(--green)' : 'var(--text3)';
    $('st-'+o).textContent = on ? 'Connected' : 'Not connected';
    $('st-'+o).style.color = on ? 'var(--green)' : '';
  });
  if(S.connected) {
    $('btn-refresh').disabled = false;
    document.querySelectorAll('.ntab').forEach(t => t.disabled=false);
  }
}

// ── PASSWORD GATE
function showGate() {
  $('main').innerHTML = `
  <div id="setup-screen">
    <div class="setup-hero">
      <div class="setup-icon">\u{1F510}</div>
      <div class="setup-title">Oxbridge Associates Group</div>
      <div class="setup-sub">Live consolidated financial dashboard. Enter the access password to view.</div>
    </div>
    <div class="setup-card">
      <div class="card-title"><div class="stepn">1</div>Access password</div>
      <div class="field">
        <div class="flabel">Password</div>
        <input class="finput" id="f-pw" type="password" placeholder="Enter the shared password" onkeydown="if(event.key==='Enter')submitPassword()">
      </div>
      <button class="btn btn-pri" onclick="submitPassword()">Enter</button>
      <div id="gate-msg" style="margin-top:10px;font-size:12px"></div>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="expand-btn" onclick="showConnect()" style="font-size:11px;color:var(--text3)">Admin: connect / reconnect Xero</button>
    </div>
  </div>`;
  setTimeout(()=>$('f-pw')?.focus(), 100);
}

async function submitPassword() {
  const pw = $('f-pw').value.trim();
  if(!pw) { $('gate-msg').innerHTML='<span class="red">Please enter the password.</span>'; return; }
  S.pw = pw;
  sessionStorage.setItem('ox_pw', pw);
  $('gate-msg').innerHTML='Checking…';
  try {
    await ensureSession();
    showDash(); refreshAll();
  } catch(err) {
    if(err.message==='not_connected') {
      $('gate-msg').innerHTML='<span class="red">Password OK, but Xero is not connected yet. Ask the admin to connect it.</span>';
    } else if(err.message==='unauthorized') {
      S.pw=''; sessionStorage.removeItem('ox_pw');
      $('gate-msg').innerHTML='<span class="red">Wrong password.</span>';
    } else {
      $('gate-msg').innerHTML='<span class="red">'+err.message+'</span>';
    }
  }
}

// ── ADMIN: one-time Xero connect (stores tokens server-side)
function showConnect() {
  const uri = location.href.split('?')[0].split('#')[0];
  $('main').innerHTML = `
  <div id="setup-screen">
    <div class="setup-hero">
      <div class="setup-icon">\u{1F517}</div>
      <div class="setup-title">Connect Xero (admin)</div>
      <div class="setup-sub">One-time setup. Sign in to Xero once; the connection is stored securely on the server so colleagues never need Xero access. You must enter the access password first.</div>
    </div>
    <div class="setup-card">
      <div class="card-title"><div class="stepn">1</div>Access password</div>
      <div class="field">
        <input class="finput" id="c-pw" type="password" placeholder="Shared access password" value="${S.pw||''}">
      </div>
    </div>
    <div class="setup-card">

// ── ADMIN CONNECT FLOW (PKCE; secret stays server-side)
async function startConnect() {
  const pw = $('c-pw').value.trim();
  const cid = $('f-cid').value.trim();
  if(!pw) { toast('Enter the access password first','e'); return; }
  if(!cid) { toast('Enter your Xero Client ID','e'); return; }
  S.pw = pw; sessionStorage.setItem('ox_pw', pw);
  S.clientId = cid; localStorage.setItem('ox_cid', cid);
  const verifier = generateVerifier();
  const challenge = await makeChallenge(verifier);
  sessionStorage.setItem('xv_connect', verifier);
  const redirect = location.href.split('?')[0].split('#')[0];
  const p = new URLSearchParams({
    response_type:'code', client_id:cid, redirect_uri:redirect,
    scope:SCOPES, state:'connect',
    code_challenge:challenge, code_challenge_method:'S256',
  });
  location.href = XERO_AUTH+'?'+p.toString();
}

async function doBootstrap(code) {
  $('main').innerHTML = '<div style="text-align:center;padding:80px 0;color:var(--text3)">Connecting Xero and storing securely…</div>';
  try {
    const redirect = location.href.split('?')[0].split('#')[0];
    const verifier = sessionStorage.getItem('xv_connect') || '';
    const r = await fetch('/.netlify/functions/bootstrap', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-app-password': S.pw },
      body: JSON.stringify({ code, redirect_uri: redirect, code_verifier: verifier }),
    });
    const txt = await r.text();
    if(!r.ok) throw new Error('Connect failed: '+txt);
    const res = JSON.parse(txt);
    toast('\u2713 Connected: '+(res.tenantNames||[]).join(', '),'o');

    toast(err.message,'e');

}

// ── SESSION: validate password + ensure a fresh server-side token (called once before data fetches)
async function ensureSession() {
  const r = await fetch('/.netlify/functions/session', { headers:{ 'x-app-password': S.pw } });
  if(r.status===401) throw new Error('unauthorized');
  if(r.status===409) throw new Error('not_connected');
  if(!r.ok) throw new Error('Session error: '+r.status);
  const res = await r.json();
  S.connected = true;
  S.tenantNames = res.tenantNames || [];
  updateSidebar();
  return res;
}

// ── XERO API (server-side tokens; browser only sends the password)
async function xGet(org, path) {
  const r = await fetch('/.netlify/functions/data?org='+org+'&path='+encodeURIComponent(path), {
    headers:{ 'x-app-password': S.pw }
  });
  if(!r.ok) throw new Error(`Xero API error (${org}): ${r.status} ${await r.text()}`);
  return r.json();
}

function getFYYear(dateStr) {
  const d = new Date(dateStr);
  const m = d.getMonth(); // 0=Jan ... 3=Apr
  // FY starts 1 April. Jan-Mar (months 0-2) belong to FY that started previous calendar year.
  return m >= 3 ? d.getFullYear() : d.getFullYear() - 1;
}

async function getPnL(org) {
  // Pass fromDate = current FY April start so Xero returns correct YTD
  const to = new Date().toISOString().slice(0,10);
  const fyYear = getFYYear(to);
  const fyStart = `${fyYear}-04-01`;
  const data = await xGet(org, `/Reports/ProfitAndLoss?fromDate=${fyStart}&toDate=${to}`);
  return parseReport(data, org+' P&L');
}

// Fetch P&L with N periods (individual monthly columns from Xero periods API)
async function fetchPeriodsPnL(org, numPeriods) {
  const data = await xGet(org, `/Reports/ProfitAndLoss?periods=${numPeriods}&timeframe=MONTH`);
  return parseReportMonthly(data);
}

// Parse multi-column P&L response → { headers:[], rows:{key:[col0,col1,...]} }
function parseReportMonthly(data) {
  const report = data.Reports?.[0];
  if(!report) return {headers:[], rows:{}};
  const headerRow = report.Rows?.find(r => r.RowType==='Header');
  const headers = headerRow?.Cells?.slice(1).map(c=>c.Value||'') || [];
  const rows = {};
  function walk(list) {
    if(!list) return;
    for(const row of list) {
      if((row.RowType==='Row'||row.RowType==='SummaryRow') && row.Cells?.length>=2) {
        const k = row.Cells[0]?.Value?.trim();
        if(k) rows[k] = row.Cells.slice(1).map(c=>parseFloat((c.Value||'').replace(/[,\s]/g,''))||0);
      }
      if(row.Rows) walk(row.Rows);
    }
  }
  walk(report.Rows);
  return {headers, rows};
}

// Extract FY year from a Xero period header like "30 Apr 26" or "31 May 2026"
function parseHeaderFY(h) {
  const mn = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  let month=0, year=0;
  (h||'').split(/[\s/]+/).forEach(p => {
    const m = Object.entries(mn).find(([name]) => p.startsWith(name));
    if(m) month = m[1];
    if(/^\d{4}$/.test(p)) year = parseInt(p);
    if(/^\d{2}$/.test(p) && parseInt(p)>=20 && parseInt(p)<=50) year = 2000+parseInt(p);
  });
  if(!month||!year) return 0;
  return month>=4 ? year : year-1;
}

// Get a single column from a rows dict as a flat object
function getColObj(rows, col) {
  const obj={};
  for(const [k,v] of Object.entries(rows)) {
    obj[k] = Array.isArray(v) ? (v[col]||0) : (v||0);
  }
  return obj;
}

// Subtract two flat P&L objects to get individual monthly figures
function subtractPnL(curr, prev) {
  const result={};
  const keys=new Set([...Object.keys(curr),...Object.keys(prev)]);
  for(const k of keys) {
    if(k==='_fx'){result._fx=curr._fx||prev._fx;continue;}
    result[k]=(curr[k]||0)-(prev[k]||0);
  }
  return result;
}

async function getBS(org) {
  const today = new Date().toISOString().slice(0,10);
  // Try with paymentsOnly=false to get full accrual BS
  const data  = await xGet(org,`/Reports/BalanceSheet?date=${today}&paymentsOnly=false`);
  const result = parseReport(data, org+' BS');
  if(Object.keys(result).filter(k=>!k.startsWith('_')).length < 3) {
    // If empty, try without date parameter
    console.warn(org+' BS empty, trying without date');
    const data2 = await xGet(org,`/Reports/BalanceSheet`);
    const r2 = parseReport(data2, org+' BS retry');
    r2._rows = data2.Reports?.[0]?.Rows || [];
    return r2;
  }
  result._rows = data.Reports?.[0]?.Rows || [];
  return result;
}

// Build a hierarchical section tree from a Xero report's raw Rows (for the detailed BS view)
// Returns [{title, total, rows:[{name,value}], subs:[...]}]
function buildBSTree(rawRows, mult) {
  mult = mult || 1;
  const num = cell => (parseFloat((cell?.Value||'').replace(/[,\s]/g,''))||0) * mult;
  function walk(rows) {
    const out = [];
    for(const row of (rows||[])) {
      if(row.RowType==='Section') {
        const node = {title: row.Title||'', rows: [], subs: [], total: null};
        for(const sub of (row.Rows||[])) {
          if(sub.RowType==='Row' && sub.Cells?.length>=2) {
            const name = sub.Cells[0]?.Value?.trim();
            if(name) node.rows.push({name, value: num(sub.Cells[1])});
          } else if(sub.RowType==='SummaryRow' && sub.Cells?.length>=2) {
            node.total = num(sub.Cells[1]);
            node.totalLabel = sub.Cells[0]?.Value?.trim();
          } else if(sub.RowType==='Section') {
            node.subs.push(...walk([sub]));
          }
        }
        // Fallback total = sum of own rows if no summary row
        if(node.total==null && node.rows.length) node.total = node.rows.reduce((s,r)=>s+r.value,0);
        if(node.rows.length || node.subs.length) out.push(node);
      }
    }
    return out;
  }
  return walk(rawRows);
}

function parseReport(data, label) {
  const m = {};
  let fxEUR = null;
  function walk(rows) {
    if(!rows) return;
    for(const row of rows) {
      if((row.RowType==='Row'||row.RowType==='SummaryRow') && row.Cells?.length>=2) {
        const k = row.Cells[0]?.Value?.trim();
        // For PnL with periods=1: col[1]=YTD, col[2]=month. Use month (col[2]) if present, else col[1]
        const v = parseFloat((row.Cells[1]?.Value||'').replace(/[,\s]/g,''))||0;
        if(k) m[k] = (m[k]||0) + v;
        // Scan for FX rate in any cell
        row.Cells.forEach(c => {
          const match = (c.Value||'').match(/([\d.]{4,})\s+EUR/);
          if(match) fxEUR = parseFloat(match[1]);
        });
      }
      if(row.Rows) walk(row.Rows);
    }
  }
  walk(data.Reports?.[0]?.Rows);
  m._fx = fxEUR;
  return m;
}

// ── MAIN REFRESH
async function refreshAll() {
  const btn=$('btn-refresh'), ri=$('ri');
  btn.disabled=true; ri.className='spin'; ri.textContent='↻';
  toast('Fetching live data from Xero...','o');
  try {
    // Validate password + refresh the server-side token ONCE before the parallel fetches
    await ensureSession();
    const [ukPL,bvPL,ardPL,ukBS,bvBS,ardBS] = await Promise.all([
      getPnL('uk').catch(e=>{console.warn('UK PL:',e);return{};}),
      getPnL('bv').catch(e=>{console.warn('BV PL:',e);return{};}),
      getPnL('ard').catch(e=>{console.warn('ARD PL:',e);return{};}),
      getBS('uk').catch(e=>{console.warn('UK BS:',e);return{};}),
      getBS('bv').catch(e=>{console.warn('BV BS:',e);return{};}),
      getBS('ard').catch(e=>{console.warn('ARD BS:',e);return{};}),
    ]);

    // FX from BV BS footer (XE.com rate)
    const fx = bvBS._fx || 0.866122;
    $('fx-disp').textContent = fx.toFixed(4);
    const c = v => (v||0)*fx;

    // ── UK P&L
    const ukExtSales   = ukPL['Sales']||0;
    const ukInterco    = ukPL['Sales (inter company)']||0;
    const ukTotalSales = ukExtSales + ukInterco;
    const ukCOSkeys    = new Set(['Purchases','Purchase (inter company)','Logistic Costs',
      'Damage/Shortage of goods','Plastic Packaging Tax','Warehouse Costs','Duty']);
    const ukCOS   = ('Total Cost of Sales' in ukPL) ? ukPL['Total Cost of Sales'] : Object.entries(ukPL).filter(([k])=>ukCOSkeys.has(k)).reduce((s,[,v])=>s+v,0);
    const ukGP    = ('Gross Profit' in ukPL) ? ukPL['Gross Profit'] : (ukTotalSales - ukCOS);
    const ukOther = (ukPL['Inter-entity BV TP Adjustment']||0)+(ukPL['Sundry Receipts']||0);
    const ukExclude = new Set([...ukCOSkeys,'Sales','Sales (inter company)',
      'Inter-entity BV TP Adjustment','Sundry Receipts',
      'Gross Profit','Net Profit','Foreign Currency Gains and Losses',
      'Total Turnover','Total Cost of Sales','Total Administrative Costs',
      'Total Other Income','Operating Profit',
      'Profit on Ordinary Activities Before Taxation','Profit after Taxation','_fx']);
    const ukTax   = ukPL['Corporation Tax']||0;
    const ukAdminRebuild = ('Total Operating Expenses' in ukPL) ? ukPL['Total Operating Expenses']
                  : ('Total Administrative Costs' in ukPL) ? ukPL['Total Administrative Costs']
                  : Object.entries(ukPL).filter(([k])=>!ukExclude.has(k)&&!k.startsWith('Total ')&&k!=='Corporation Tax').reduce((s,[,v])=>s+v,0);
    // Anchor UK net to Xero's OWN Current Year Earnings (from the balance sheet) — the authoritative
    // bottom line. UK's P&L feed has no clean net row and doesn't expose every cost line (FX lines are
    // combined by Xero), so rebuilding from line items leaks; CY earnings is always the true YTD net.
    const ukNet   = ('Current Year Earnings' in ukBS) ? ukBS['Current Year Earnings']
                  : ('Net Profit' in ukPL) ? ukPL['Net Profit']
                  : (ukGP - ukAdminRebuild + ukOther - ukTax);
    // Total admin shown as the balancing figure (= true all-in admin incl tax) so the card foots to net
    const ukAdmin = ukGP + ukOther - ukNet;

    // ── BV P&L
    const bvExtEUR     = bvPL['External Sales']||0;
    const bvIntercoEUR = bvPL['Inter Co Sales']||0;
    const bvCOSkeys    = new Set(['External COGS','Inter Co COGS','Logistic Costs',
      'Warehouse Costs','External COGS - Import Duties','Labelling','Damage/Shortage of goods']);
    const bvCOSEUR  = Object.entries(bvPL).filter(([k])=>bvCOSkeys.has(k)).reduce((s,[,v])=>s+v,0);
    const bvGrossEUR= ('Gross Profit' in bvPL) ? bvPL['Gross Profit'] : (bvExtEUR + bvIntercoEUR - bvCOSEUR);
    const bvExclude = new Set([...bvCOSkeys,'External Sales','Inter Co Sales',
      'Gross Profit','Net Profit','Total Trading Income','Total Cost of Sales',
      'Total Operating Expenses','_fx']);
    const bvExpEUR  = Object.entries(bvPL).filter(([k])=>!bvExclude.has(k)&&!k.startsWith('Total ')).reduce((s,[,v])=>s+v,0);
    const bvNetEUR  = ('Net Profit' in bvPL) ? bvPL['Net Profit'] : (bvGrossEUR - bvExpEUR);

    // ── ARD P&L
    const ardIncome = ardPL['Sales']||0;
    const ardCOS    = ardPL['Direct Wages']||0;
    const ardGP     = ardIncome - ardCOS;
    const ardExclude= new Set(['Sales','Direct Wages','Gross Profit','Net Profit',
      'Total Turnover','Total Cost of Sales','Total Administrative Costs',
      'Operating Profit','Profit on Ordinary Activities Before Taxation',
      'Profit after Taxation','_fx']);
    const ardAdmin  = Object.entries(ardPL).filter(([k])=>!ardExclude.has(k)&&!k.startsWith('Total ')).reduce((s,[,v])=>s+v,0);
    const ardNet    = ('Net Profit' in ardPL) ? ardPL['Net Profit'] : ('Profit after Taxation' in ardPL) ? ardPL['Profit after Taxation'] : ('Operating Profit' in ardPL) ? ardPL['Operating Profit'] : (ardGP - ardAdmin);

    // ── Interco eliminations
    const intercoTotal = ukInterco + c(bvIntercoEUR) + ardIncome;

    // ── Consolidated
    const consExt = ukExtSales + c(bvExtEUR);
    const consGP  = ukGP + c(bvGrossEUR);
    const consNet = ukNet + c(bvNetEUR) + ardNet;
    const gpPct   = consExt>0 ? consGP/consExt : 0;

    // ── Product (cash) margin — matches management accounts: Sales − product COGS only
    // (Purchases / COGS lines; excludes logistics, warehouse, duty, labelling, damage, packaging tax)
    const ukProdCOS    = (ukPL['Purchases']||0) + (ukPL['Purchase (inter company)']||0);
    const ukMargin     = ukTotalSales - ukProdCOS;
    const ukMarginPct  = ukExtSales>0 ? ukMargin/ukExtSales : 0;
    const bvProdCOSEUR = (bvPL['External COGS']||0) + (bvPL['Inter Co COGS']||0);
    const bvMarginEUR  = (bvExtEUR + bvIntercoEUR) - bvProdCOSEUR;
    const bvMarginGBP  = c(bvMarginEUR);
    const bvMarginPct  = c(bvExtEUR)>0 ? bvMarginGBP/c(bvExtEUR) : 0;
    const consMargin   = ukMargin + bvMarginGBP;
    const marginPct    = consExt>0 ? consMargin/consExt : 0;

    // ── Balance Sheet
    const ukStock = ukBS['Stock on hand']||0;
    const bvStock = c(bvBS['Stock on Hand']||0);
    const ukDeb   = ukBS['Accounts Receivable']||0;
    const bvDeb   = c(bvBS['Accounts Receivable']||0);
    const ukCred  = Math.abs(ukBS['Accounts Payable']||0);
    const bvCred  = c(Math.abs(bvBS['Accounts Payable']||0));
    const ukCash  = (ukBS['Oxbridge Associates Limited']||0)
                  + (ukBS['Revolut GBP Main']||0)
                  + (ukBS['VM - Business']||0);
    const bvBank  = c((bvBS['ABN AMRO']||0)
                  + (bvBS['Bibby Financial Bank Euro']||0)
                  + (bvBS['Revolut EUR Main']||0));
    const ardCash = ardBS['A.R.D INTERNATIONAL']||0;
    const wc      = ukStock+bvStock+ukDeb+bvDeb-ukCred-bvCred;

    // ── Capital & Reserves
    // UK: confirmed field names from BS
    const ukRet  = ukBS['Retained Earnings']||0;
    const ukCY   = ukBS['Current Year Earnings']||0;
    // BV: Current Year Earnings confirmed = 93,310 EUR (not -3,107)
    // The -3,107 appears when BV BS returns wrong period - use P&L net as fallback
    const bvRetRaw = bvBS['Retained Earnings']||0;
    const bvCYRaw  = bvBS['Current Year Earnings']||0;
    // If BV CY is negative but BV P&L net is positive, use P&L net (BS returning wrong period)
    const bvRet  = c(bvRetRaw);
    const bvCY   = (bvCYRaw > 0) ? c(bvCYRaw) : c(bvNetEUR);
    // ARD: BS snaps to 31 Mar 2026. CY on BS = last FY profit = £33,119
    // Use hardcoded known value since ARD BS always returns March figures
    const ardRet = ardBS['Current Year Earnings']||ardBS['Retained Earnings']||33119.14;
    const ardCY  = ardNet;
    const distribTotal = ukRet+ukCY+bvRet+bvCY+ardRet+ardCY;
    // Debug
    console.log('Cap fix: ukRet='+ukRet.toFixed(0)+' ukCY='+ukCY.toFixed(0)+' bvRetRaw='+bvRetRaw.toFixed(0)+' bvCYRaw='+bvCYRaw.toFixed(0)+' bvCY='+bvCY.toFixed(0)+' ardRet='+ardRet.toFixed(0));

    // ── Facilities
    const virIF    = Math.abs(ukBS['VM Facility GBP']||0);
    const virPurch = Math.abs(ukBS['VM Purchase Facility']||0);
    const bibby    = c(Math.abs(bvBS['Bibby Financial EURO']||0));

    S.data = {
      refreshedAt: new Date(), fx,
      rawPL: {uk: ukPL, bv: bvPL, ard: ardPL},
      uk:  {extSales:ukExtSales,interco:ukInterco,totalSales:ukTotalSales,
            cos:ukCOS,gp:ukGP,admin:ukAdmin,net:ukNet,ret:ukRet,cy:ukCY,
            margin:ukMargin,marginPct:ukMarginPct},
      bv:  {extEUR:bvExtEUR,intercoEUR:bvIntercoEUR,extGBP:c(bvExtEUR),
            gpGBP:c(bvGrossEUR),expGBP:c(bvExpEUR),netGBP:c(bvNetEUR),ret:bvRet,cy:bvCY,
            margin:bvMarginGBP,marginPct:bvMarginPct},
      ard: {income:ardIncome,exp:ardAdmin,net:ardNet,ret:ardRet,cy:ardCY},
      cons:{extSales:consExt,gp:consGP,net:consNet,gpPct,margin:consMargin,marginPct,intercoElim:intercoTotal},
      bs:  {ukStock,bvStock,ukDeb,bvDeb,ukCred,bvCred,ukCash,bvBank,ardCash,wc},
      cap: {ukRet,ukCY,bvRet,bvCY,ardRet,ardCY,distribTotal},
      fac: {
        virIF:   {actual:virIF,  limit:1500000,name:'Virgin IF (UK)'},
        virPurch:{actual:virPurch,limit:2000000,name:'Virgin Purchase (UK)'},
        bibby:   {actual:bibby,  limit:1500000,name:'Bibby BV (€→£)'},
      },
      ardInv:  ardBS['Investment']||1343963.90,
      ardLoan: Math.abs(ardBS['Virgin Money Loan']||483333.32),
      bsTree: {
        uk:  buildBSTree(ukBS._rows, 1),
        bv:  buildBSTree(bvBS._rows, fx),
        ard: buildBSTree(ardBS._rows, 1),
      },
    };

    const now = S.data.refreshedAt;
    $('last-rt').textContent = now.toLocaleTimeString('en-GB')+' · '+now.toLocaleDateString('en-GB');
    $('period-badge').textContent = 'Live · '+now.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
    $('period-badge').className = 'pbadge live';
    renderView();
    toast('✓ ✓ Refreshed from all 3 Xero orgs','o');

  } catch(err) {
    console.error(err);
    if(err.message==='unauthorized') {
      S.pw=''; sessionStorage.removeItem('ox_pw'); S.connected=false;
      toast('Session expired — please re-enter the password','e');
      showGate();
    } else if(err.message==='not_connected') {
      toast('Xero is not connected yet — admin must connect it','e');
      showConnect();
    } else {
      toast('Refresh failed: '+err.message,'e');
    }
  } finally {
    btn.disabled=false; ri.className=''; ri.textContent='↻';
  }
}

function toggleSection(id) {
  const rows = document.querySelectorAll('.detail-'+id);
  const btn = document.getElementById('expand-'+id);
  const hidden = rows[0]?.style.display === 'none' || rows[0]?.style.display === '';
  rows.forEach(r => r.style.display = hidden ? 'table-row' : 'none');
  if(btn) btn.textContent = hidden ? '▲' : '▼';
}

function renderBalance(el) {
  const d=S.data, bs=d.bs;
  const fmtS = v => v==null||isNaN(v)?'—':(v<0?'-':'')+'£'+Math.abs(Math.round(v)).toLocaleString('en-GB');

  // Find an entity's Capital & Reserves / Equity total (= Net Assets)
  const capTotal = key => {
    const t=(d.bsTree&&d.bsTree[key])||[];
    const s=t.find(x=>/capital|equity/i.test(x.title));
    return s? (s.total!=null?s.total:s.rows.reduce((a,r)=>a+r.value,0)) : null;
  };

  // Classify sections → assets / liabilities; pick out intercompany loan balances
  const isInterco = n => /amts owed|loan a\.r\.d|oxbridge loan|group company|inter ?co|intercompany/i.test(n||'');
  const entTotals = key => {
    const tree=(d.bsTree&&d.bsTree[key])||[];
    let assets=0, liabs=0, icRecv=0, icPay=0;
    tree.forEach(sec=>{
      const t=(sec.title||'').toLowerCase();
      const isLiab=/liabilit|creditor/.test(t);
      const isAsset=(/asset|bank/.test(t)) && !isLiab;
      const tot=sec.total!=null?sec.total:(sec.rows.reduce((s,r)=>s+r.value,0)+sec.subs.reduce((s,su)=>s+(su.total||0),0));
      if(isLiab) liabs+=tot; else if(isAsset) assets+=tot;
      const allRows=[...sec.rows, ...sec.subs.flatMap(su=>su.rows)];
      allRows.forEach(r=>{ if(isInterco(r.name)){ if(isLiab) icPay+=r.value; else if(isAsset) icRecv+=r.value; } });
    });
    return {assets, liabs, icRecv, icPay};
  };
  const T = {uk:entTotals('uk'), bv:entTotals('bv'), ard:entTotals('ard')};
  const grossAssets = T.uk.assets+T.bv.assets+T.ard.assets;
  const grossLiabs  = T.uk.liabs+T.bv.liabs+T.ard.liabs;
  const icRecvTot   = T.uk.icRecv+T.bv.icRecv+T.ard.icRecv;
  const icPayTot    = T.uk.icPay+T.bv.icPay+T.ard.icPay;
  const totalAssets = grossAssets - icRecvTot;
  const totalLiabs  = grossLiabs - icPayTot;
  const groupNet    = totalAssets - totalLiabs;

  // Render one entity's full BS as collapsible sections
  function panel(key, title, ccy) {
    const tree=(d.bsTree&&d.bsTree[key])||[];
    if(!tree.length) return `<div class="twrap" style="margin:0"><table class="ptable"><thead><tr><th style="text-align:left">${title}</th><th>${ccy}</th></tr></thead><tbody><tr><td style="text-align:left;color:var(--text3)">No data — hit Refresh</td><td></td></tr></tbody></table></div>`;
    let html='';
    tree.forEach((sec,si)=>{
      const gid=key+'-'+si;
      let detail='';
      sec.subs.forEach(sub=>{
        detail+=`<tr class="detail-bs-${gid}" style="display:none"><td style="text-align:left;padding-left:20px;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.5px">${sub.title}</td><td></td></tr>`;
        sub.rows.forEach(r=>{ detail+=`<tr class="detail-bs-${gid}" style="display:none"><td style="text-align:left;padding-left:28px">${r.name}</td><td class="${r.value<0?'vn':''}">${fmtS(r.value)}</td></tr>`; });
        if(sub.total!=null) detail+=`<tr class="detail-bs-${gid}" style="display:none"><td style="text-align:left;padding-left:24px;color:var(--text2)">${sub.totalLabel||('Total '+sub.title)}</td><td style="color:var(--text2);font-weight:600">${fmtS(sub.total)}</td></tr>`;
      });
      sec.rows.forEach(r=>{ detail+=`<tr class="detail-bs-${gid}" style="display:none"><td style="text-align:left;padding-left:28px">${r.name}</td><td class="${r.value<0?'vn':''}">${fmtS(r.value)}</td></tr>`; });
      const total = sec.total!=null ? sec.total : (sec.rows.reduce((s,r)=>s+r.value,0)+sec.subs.reduce((s,su)=>s+(su.total||0),0));
      html+=`<tr class="tr-h" style="cursor:pointer" onclick="toggleSection('bs-${gid}')"><td style="text-align:left"><button class="expand-btn" id="expand-bs-${gid}">▼</button> ${sec.title}</td><td style="font-weight:700">${fmtS(total)}</td></tr>`;
      html+=detail;
    });
    return `<div class="twrap" style="margin:0"><table class="ptable">
      <thead><tr><th style="text-align:left">${title}</th><th>${ccy}</th></tr></thead>
      <tbody>${html}</tbody></table></div>`;
  }

  const ukNA=capTotal('uk'), bvNA=capTotal('bv'), ardNA=capTotal('ard');

  el.innerHTML=`
  <div class="ph"><div class="pt">Balance Sheet</div><div class="ps">Live · ${d.refreshedAt.toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})} · BV converted €→£ @ ${d.fx.toFixed(4)} · click any section to expand</div></div>
  <div class="kgrid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kcard" style="border-color:var(--green)"><div class="klabel">Total Assets (Group)</div><div class="kval">${fmt(totalAssets)}</div><div class="ksub">Interco eliminated: ${fmt(icRecvTot)}</div></div>
    <div class="kcard" style="border-color:var(--red)"><div class="klabel">Total Liabilities (Group)</div><div class="kval red">${fmt(totalLiabs)}</div><div class="ksub">Interco eliminated: ${fmt(icPayTot)}</div></div>
    <div class="kcard" style="border-color:var(--accent)"><div class="klabel">Group Net Assets</div><div class="kval ${groupNet<0?'red':'green'}">${fmt(groupNet)}</div><div class="ksub">Assets − Liabilities</div></div>
  </div>
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kcard"><div class="klabel">Total Stock</div><div class="kval">${fmt(bs.ukStock+bs.bvStock)}</div><div class="ksub">UK ${fmt(bs.ukStock)} · BV ${fmt(bs.bvStock)}</div></div>

// ── PERIODS VIEW
let periodsState = { range: 'ytd', activeCol: null, data: null };

function calcMonthPnL(uk, bv, ard, fx) {
  const c = v => (v||0)*fx;
  const g = (obj, k) => obj[k]||0;

  const ukSales   = g(uk,'Sales');
  const ukInterco = g(uk,'Sales (inter company)');
  const ukCOS     = ['Purchases','Purchase (inter company)','Logistic Costs','Damage/Shortage of goods','Plastic Packaging Tax','Warehouse Costs','Duty'].reduce((s,k)=>s+g(uk,k),0);
  const ukGP      = ('Gross Profit' in uk) ? g(uk,'Gross Profit') : (ukSales + ukInterco - ukCOS);
  const ukExclude = new Set(['Sales','Sales (inter company)','Purchases','Purchase (inter company)','Logistic Costs','Damage/Shortage of goods','Plastic Packaging Tax','Warehouse Costs','Duty','Inter-entity BV TP Adjustment','Sundry Receipts','Gross Profit','Net Profit','Foreign Currency Gains and Losses','Total Turnover','Total Cost of Sales','Total Administrative Costs','Total Other Income','Operating Profit','Profit on Ordinary Activities Before Taxation','Profit after Taxation','_fx']);
  const ukTax     = g(uk,'Corporation Tax');
  const ukAdmin   = ('Total Operating Expenses' in uk) ? g(uk,'Total Operating Expenses')
                  : ('Total Administrative Costs' in uk) ? g(uk,'Total Administrative Costs')
                  : Object.entries(uk).filter(([k])=>!ukExclude.has(k)&&!k.startsWith('Total ')&&k!=='Corporation Tax').reduce((s,[,v])=>s+v,0);
  const ukOther   = g(uk,'Inter-entity BV TP Adjustment') + g(uk,'Sundry Receipts');
  const ukNet     = ('Net Profit' in uk) ? g(uk,'Net Profit')
                  : ('Profit after Taxation' in uk) ? g(uk,'Profit after Taxation')
                  : (ukGP - ukAdmin + ukOther - ukTax);

  const bvExt     = g(bv,'External Sales');
  const bvInterco = g(bv,'Inter Co Sales');
  const bvCOS     = ['External COGS','Inter Co COGS','Logistic Costs','Warehouse Costs','External COGS - Import Duties','Labelling','Damage/Shortage of goods'].reduce((s,k)=>s+g(bv,k),0);
  const bvGross   = ('Gross Profit' in bv) ? g(bv,'Gross Profit') : (bvExt + bvInterco - bvCOS);
  const bvExclude = new Set(['External Sales','Inter Co Sales','External COGS','Inter Co COGS','Logistic Costs','Warehouse Costs','External COGS - Import Duties','Labelling','Damage/Shortage of goods','Gross Profit','Net Profit','Total Trading Income','Total Cost of Sales','Total Operating Expenses','_fx']);
  const bvExp     = Object.entries(bv).filter(([k])=>!bvExclude.has(k)&&!k.startsWith('Total ')).reduce((s,[,v])=>s+v,0);
  const bvNet     = ('Net Profit' in bv) ? g(bv,'Net Profit') : (bvGross - bvExp);

  const ardInc    = g(ard,'Sales');
  const ardCOS2   = g(ard,'Direct Wages');
  const ardExclude= new Set(['Sales','Direct Wages','Gross Profit','Net Profit','Total Turnover','Total Cost of Sales','Total Administrative Costs','Operating Profit','Profit on Ordinary Activities Before Taxation','Profit after Taxation','_fx']);
  const ardAdmin  = Object.entries(ard).filter(([k])=>!ardExclude.has(k)&&!k.startsWith('Total ')).reduce((s,[,v])=>s+v,0);
  const ardNet    = ('Net Profit' in ard) ? g(ard,'Net Profit') : ('Profit after Taxation' in ard) ? g(ard,'Profit after Taxation') : ('Operating Profit' in ard) ? g(ard,'Operating Profit') : (ardInc - ardCOS2 - ardAdmin);

  const extSales  = ukSales + c(bvExt);
  const gp        = ukGP + c(bvGross);
  const net       = ukNet + c(bvNet) + ardNet;
  const gpPct     = extSales>0 ? gp/extSales : 0;

  // Product (cash) margin — Sales − product COGS only (matches management accounts)
  const ukMargin  = (ukSales + ukInterco) - (g(uk,'Purchases') + g(uk,'Purchase (inter company)'));
  const bvMargin  = (bvExt + bvInterco) - (g(bv,'External COGS') + g(bv,'Inter Co COGS'));
  const margin    = ukMargin + c(bvMargin);
  const marginPct = extSales>0 ? margin/extSales : 0;

  return {ukSales, ukInterco, ukGP, ukAdmin, ukNet, ukOther,
          bvExtGBP:c(bvExt), bvIntercoEUR:bvInterco, bvGPGBP:c(bvGross), bvNetGBP:c(bvNet),
          ardInc, ardNet, extSales, gp, net, gpPct, margin, marginPct};
}

// ── PERIODS VIEW
let _periodsGen = 0;

// Build the months to show (most recent first), each with explicit from/to dates
// so each column's P&L matches Xero's own month-end report exactly.
function buildMonthList(numPeriods) {
  const ymd = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const today = new Date();
  const out = [];
  for(let i=0; i<numPeriods; i++) {
    const first = new Date(today.getFullYear(), today.getMonth()-i, 1);
    const last  = new Date(first.getFullYear(), first.getMonth()+1, 0); // last day of that month
    const to    = (i===0) ? today : last;  // current month = month-to-date; past months = full month
    out.push({
      from:  ymd(first),
      to:    ymd(to),
      label: first.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}) + (i===0 ? ' (MTD)' : ''),
    });
  }
  return out; // newest first
}

// One month's P&L via an explicit date range — reads Xero's own subtotals,
// so it reconciles to the month-end accounts (avoids the timeframe=MONTH split issue).
async function fetchMonthPnL(org, from, to) {
  const data = await xGet(org, `/Reports/ProfitAndLoss?fromDate=${from}&toDate=${to}`);
  return parseReport(data, `${org} ${from}`);
}

async function loadPeriods(range) {
  periodsState.range = range;
  const myGen = ++_periodsGen;

  // Calculate how many months to show
  let numPeriods;
  if(range==='ytd') {
    const today=new Date(), fyStart=new Date(today.getFullYear(),3,1);
    if(today<fyStart) fyStart.setFullYear(fyStart.getFullYear()-1);
    numPeriods=Math.min((today.getFullYear()-fyStart.getFullYear())*12+(today.getMonth()-fyStart.getMonth())+1,12);
  } else {
    numPeriods={'1m':1,'3m':3,'6m':6,'12m':12}[range]||3;
  }

  const el=$('main');
  const months = buildMonthList(numPeriods);  // newest first; explicit per-month date ranges
  el.innerHTML=`<div style="text-align:center;padding:60px 0;color:var(--text3)">
    Loading ${months.length} months from Xero\u2026 <span id="pl-prog" style="font-size:11px;opacity:.6">(0/${months.length})</span>
  </div>`;

  try {
    await ensureSession();  // refresh the server-side token once before the per-month calls

    const monthlyData = [];
    for(let i=0; i<months.length; i++) {
      if(myGen!==_periodsGen) return;  // a newer load superseded this one
      const mo = months[i];
      // Each month = its own dated P&L (matches Xero's month-end reports), 3 orgs in parallel
      const [uk, bv, ard] = await Promise.all([
        fetchMonthPnL('uk',  mo.from, mo.to).catch(()=>({})),
        fetchMonthPnL('bv',  mo.from, mo.to).catch(()=>({})),
        fetchMonthPnL('ard', mo.from, mo.to).catch(()=>({})),
      ]);
      monthlyData.push({ label: mo.label, uk, bv, ard });
      const prog=$('pl-prog'); if(prog) prog.textContent=`(${i+1}/${months.length})`;
    }

    if(myGen!==_periodsGen) return;
    if(!monthlyData.length) { el.innerHTML='<div style="color:var(--red);padding:40px">No data returned from Xero. Try the main Refresh button first.</div>'; return; }

    periodsState.data={monthlyData};
    periodsState.activeCol=0;
    renderPeriods(el);
  } catch(err) {
    if(myGen!==_periodsGen) return;
    if(err.message==='unauthorized'){ S.pw=''; sessionStorage.removeItem('ox_pw'); showGate(); return; }
    if(err.message==='not_connected'){ showConnect(); return; }
    el.innerHTML=`<div style="color:var(--red);padding:40px">Error: ${err.message}</div>`;
  }
}

function renderPeriods(el) {
  if(!S.data) return;
  const {monthlyData}=periodsState.data;
  const fx=S.data.fx;
  const n=monthlyData.length;
  const activeCol=periodsState.activeCol??0;

  const months=monthlyData.map(m=>({h:m.label,...calcMonthPnL(m.uk,m.bv,m.ard,fx)}));
  const headers=months.map(m=>m.h);

  const thCols=headers.map((h,i)=>
    `<th class="${i===activeCol?'active-col':''}" onclick="periodsState.activeCol=${i};renderPeriods($('main'))" style="cursor:pointer;white-space:nowrap">${h}</th>`
  ).join('');

  const pctRow=(label,vals,indent=false)=>{
    const tds=vals.map((v,i)=>
      `<td class="mt" style="${i===activeCol?'background:rgba(124,111,224,.08)':''}${indent?';padding-left:24px':''}">${fmtP(v)}</td>`
    ).join('');
    return `<tr><td style="text-align:left;${indent?'padding-left:24px':''};color:var(--text3)">${label}</td>${tds}</tr>`;
  };
  const dataRow=(label,vals,cls='',pos=false,indent=false)=>{
    const tds=vals.map((v,i)=>{
      const col=pos?(v>=0?'vp':'vn'):vc(v);
      return `<td class="${col}" style="${i===activeCol?'background:rgba(124,111,224,.08);font-weight:600':''}">${v==null?'—':fmtF(v)}</td>`;
    }).join('');
    return `<tr class="${cls}"><td style="text-align:left;${indent?'padding-left:22px':''}">${label}</td>${tds}</tr>`;
  };

  el.innerHTML=`
  <div class="ph">
    <div class="pt">Periods — Monthly P&L</div>
    <div class="ps">Click column to highlight · All £ · BV @ ${fx.toFixed(4)} · GP% = GP ÷ External Sales</div>
  </div>
  <div class="period-bar">
    <span style="font-size:11px;color:var(--text3);margin-right:4px">Quick select:</span>
    ${[['1m','This Month'],['3m','Last 3M'],['6m','Last 6M'],['12m','Last 12M'],['ytd','YTD']].map(([r,l])=>
      `<button class="psel-btn ${periodsState.range===r?'active':''}" onclick="loadPeriods('${r}')">${l}</button>`
    ).join('')}
  </div>
  <div class="twrap">
    <table class="month-table">
      <thead><tr><th>Metric</th>${thCols}</tr></thead>
      <tbody>
        <tr class="mtr-h"><td colspan="${n+1}">Consolidated Group</td></tr>
        ${dataRow('External Sales',months.map(m=>m.extSales),'',false)}
        ${dataRow('Interco Sales',months.map(m=>(m.ukInterco||0)+((m.bvIntercoEUR||0)*fx)),'',false,true)}
        ${dataRow('Gross Profit',months.map(m=>m.gp),'mtr-t',true)}
        ${pctRow('Margin % (ext sales)',months.map(m=>m.marginPct))}
        ${dataRow('Net Profit',months.map(m=>m.net),'mtr-t',true)}
        <tr class="mtr-h"><td colspan="${n+1}">${FLAG_GB}UK Ltd</td></tr>
        ${dataRow('External Sales',months.map(m=>m.ukSales),'',false)}
        ${dataRow('Interco Sales',months.map(m=>m.ukInterco||0),'',false,true)}
        ${dataRow('Gross Profit',months.map(m=>m.ukGP),'',true)}
        ${dataRow('Admin Costs',months.map(m=>m.ukAdmin),'',false,true)}
        ${dataRow('Net Profit',months.map(m=>m.ukNet),'mtr-t',true)}
        <tr class="mtr-h"><td colspan="${n+1}">${FLAG_NL}BV (€→£)</td></tr>
        ${dataRow('External Sales',months.map(m=>m.bvExtGBP),'',false)}
        ${dataRow('Interco Sales',months.map(m=>(m.bvIntercoEUR||0)*fx),'',false,true)}
        ${dataRow('Gross Profit',months.map(m=>m.bvGPGBP),'',true)}
        ${dataRow('Net Profit',months.map(m=>m.bvNetGBP),'mtr-t',true)}
        <tr class="mtr-h"><td colspan="${n+1}">${FLAG_GB}ARD International</td></tr>
        ${dataRow('Mgmt Fee',months.map(m=>m.ardInc),'',false)}
        ${dataRow('Net Profit',months.map(m=>m.ardNet),'mtr-t',true)}
      </tbody>
    </table>
  </div>`;
}

// ── PKCE HELPERS
function generateVerifier() {
  const a=new Uint8Array(32); crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function makeChallenge(v) {
  const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ── TOAST
let toastT;
function toast(msg,type='o') {
  document.querySelector('.toast')?.remove();
  const d=document.createElement('div');
  d.className=`toast ${type==='o'?'ao':type==='e'?'ae':'aw'}`;
  d.innerHTML=`<span>${type==='o'?'✓':type==='e'?'✗':'⚠'}</span><span>${msg}</span>`;
  document.body.appendChild(d);
  clearTimeout(toastT);
  toastT=setTimeout(()=>d.remove(),6000);
}
